{% extends "unfold/layouts/base.html" %}
{% load i18n static %}

{% block breadcrumbs %}
<div class="px-4 pt-4 pre-breadcrumbs md:px-6 lg:px-8">
    <div class="flex flex-wrap items-center text-sm font-normal text-gray-500 dark:text-zinc-400 gap-x-2 gap-y-1">
        <a href="{% url 'admin:index' %}" class="text-gray-900 dark:text-white font-medium hover:underline">
            {% trans "Home" %}
        </a>
        <span class="text-gray-400 dark:text-zinc-600">/</span>
        <span class="text-gray-500 dark:text-zinc-400">Consolidado de Resultados</span>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="p-4 space-y-8 max-w-7xl mx-auto md:p-6 lg:p-8">
    
    <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-gray-200 dark:border-zinc-800 pb-4 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Consolidado de Resultados</h1>
            <p class="text-sm text-gray-500 dark:text-zinc-400">Resultados generales y estatus de las evaluaciones del personal</p>
        </div>
    </div>

    <div class="bg-white dark:bg-zinc-950 rounded-xl border border-gray-200 dark:border-zinc-800 shadow-sm p-6">
        </div>

</div>
{% endblock %}
